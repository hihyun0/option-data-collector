name: Option Data Fetch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    # GitHub Actions cron = UTC
    - cron: "8 * * * *"
    - cron: "41 7 * * *"    # 16:41 KST (만기 보호 스냅샷)
  workflow_dispatch:

concurrency:
  group: option-data-fetch
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fetcher
        run: python fetcher.py

      - name: Check for changes
        id: git_status
        run: |
          mkdir -p database
          git add database/
          
          # staging 상태의 변경 사항 확인
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in database."  
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in database."      
          fi

      - name: Upload live.db artifact
        # 위 단계에서 changed=true일 때만 실행
        if: steps.git_status.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: live-db
          path: database/
          retention-days: 5

      - name: Commit & push data
        if: steps.git_status.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -m "auto: update option data with greeks"
          git push

      # - name: Notify Discord (success)
        # if: success() && steps.git_status.outputs.changed == 'true'
        # run: |
          # UTC_TIME=$(date '+%Y-%m-%d %H:%M:%S UTC')
          # KST_TIME=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')

          #curl -X POST \
            #-H "Content-Type: application/json" \
            #-d "{
            #  \"content\": \"✅ **옵션 데이터 갱신 완료**\n⏰ KST: ${KST_TIME}\n⏰ UTC: ${UTC_TIME}\n📂 ${{ github.repository }}\"
            #}" \
            #"${{ secrets.DISCORD_WEBHOOK }}"

      - name: Notify Discord (failure)
        if: failure()
        run: |
          UTC_TIME=$(date '+%Y-%m-%d %H:%M:%S UTC')
          KST_TIME=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')

          curl -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"🚨 **옵션 데이터 수집 실패**\n⏰ KST: ${KST_TIME}\n⏰ UTC: ${UTC_TIME}\n🔗 https://github.com/${{ github.repository }}/actions\"
            }" \
            "${{ secrets.DISCORD_WEBHOOK }}"





      
